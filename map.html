<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Tracking | SmartTransit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="stylesheet" href="style.css">
</head>
<body class="map-shell">
  <header class="map-topbar">
    <div>
      <a class="back-link" href="dashboard.html">Back to Dashboard</a>
      <h1 id="mapTitle">Live Bus Tracking</h1>
    </div>
    <div class="status-row">
      <span id="networkBadge" class="network-badge">Checking network</span>
      <span id="syncBadge" class="sync-badge">Connecting</span>
    </div>
  </header>

  <main class="map-layout">
    <section class="map-panel">
      <div id="map"></div>
    </section>

    <aside class="info-panel">
      <article class="info-card highlight-card">
        <span class="info-label">Current Status</span>
        <h2 id="busName">Bus</h2>
        <p id="liveLocation">Fetching location...</p>
      </article>

      <article class="info-card">
        <span class="info-label">Next Stop</span>
        <strong id="nextStop">Waiting for data</strong>
      </article>

      <article class="info-card">
        <span class="info-label">ETA</span>
        <strong id="etaValue">-- mins</strong>
      </article>

      <article class="info-card">
        <span class="info-label">Adaptive Polling</span>
        <p id="pollingInfo">Measuring latency and adjusting update rate.</p>
      </article>

      <article class="info-card">
        <span class="info-label">Offline Buffer</span>
        <p id="bufferInfo">0 unsent sync packets</p>
      </article>
    </aside>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>

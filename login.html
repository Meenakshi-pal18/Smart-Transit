<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SmartTransit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-shell">
  <div class="ambient ambient-left"></div>
  <div class="ambient ambient-right"></div>

  <main class="auth-layout">
    <section class="auth-panel">
      <a class="back-link" href="index.html">Back to Home</a>
      <div class="badge">Welcome back</div>
      <h1>Login to your transport dashboard</h1>
      <p>Use your campus email and password to continue to live bus tracking.</p>
    </section>

    <section class="form-card">
      <form id="loginForm" class="form-stack">
        <h2>Login</h2>
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="student@college.edu" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Enter password" required>
        </label>
        <button class="button button-primary" type="submit">Login</button>
        <p class="form-hint">No account yet? <a href="signup.html">Create one</a></p>
        <p id="loginMessage" class="form-message"></p>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
